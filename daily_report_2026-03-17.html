<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云行业HR洞察 - 日报 (2026-03-17)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .date-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .date-info h2 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-item {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s;
        }

        .news-item:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .company-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .news-title {
            flex: 1;
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
            line-height: 1.4;
        }

        .priority-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .priority-high {
            background: #ffebee;
            color: #c62828;
        }

        .priority-medium {
            background: #fff3e0;
            color: #f57c00;
        }

        .news-summary {
            color: #666;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
        }

        .news-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .news-link:hover {
            color: #764ba2;
        }

        .timestamp {
            color: #999;
            font-size: 0.9em;
        }

        .summary-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            margin-top: 40px;
        }

        .summary-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.4em;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .container {
                border-radius: 0;
            }

            .content {
                padding: 20px;
            }

            .news-header {
                flex-direction: column;
            }

            .news-title {
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>云行业HR洞察</h1>
            <p>每日招聘动态与行业趋势</p>
        </div>

        <div class="content">
            <div class="date-info">
                <h2>📅 2026年3月17日 (周二)</h2>
                <p>今日共收录 5 条重要招聘与行业动态</p>
            </div>

            <div class="news-list" id="newsList">
                <!-- 新闻内容将通过JavaScript加载 -->
            </div>

            <div class="summary-section">
                <h3>📊 今日数据概览</h3>
                <div class="summary-stats">
                    <div class="stat-item">
                        <div class="stat-number">5</div>
                        <div class="stat-label">总新闻数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">3</div>
                        <div class="stat-label">高优先级</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">2</div>
                        <div class="stat-label">中优先级</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">350+</div>
                        <div class="stat-label">招聘岗位</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const newsData = [
            {
                company: "阿里云",
                title: "阿里云发布企业级AI产品矩阵,扩招AI研发团队",
                summary: "阿里云发布企业级AI产品矩阵,涵盖大模型平台、AI开发工具等,计划招聘200+AI研发人员。",
                link: "https://jobs.aliyun.com",
                timestamp: "2026-03-17 09:00",
                priority: "高",
                tags: ["AI产品", "研发招聘", "阿里云"]
            },
            {
                company: "腾讯云",
                title: "腾讯云边缘计算部门成立,招聘相关技术专家",
                summary: "腾讯云成立边缘计算部门,重点招聘边缘计算架构师和研发工程师,目标50+岗位。",
                link: "https://cloud.tencent.com/joinus",
                timestamp: "2026-03-17 10:30",
                priority: "高",
                tags: ["边缘计算", "技术招聘", "腾讯云"]
            },
            {
                company: "华为云",
                title: "华为云发布行业解决方案,招聘行业专家",
                summary: "华为云发布金融、医疗、教育等行业解决方案,重点招聘行业解决方案架构师。",
                link: "https://career.huawei.com",
                timestamp: "2026-03-17 14:00",
                priority: "高",
                tags: ["行业解决方案", "架构师招聘", "华为云"]
            },
            {
                company: "火山引擎",
                title: "火山引擎直播技术团队扩招",
                summary: "火山引擎直播技术团队启动招聘,重点招聘视频编解码工程师和直播产品经理。",
                link: "https://career.volcengine.com",
                timestamp: "2026-03-17 11:30",
                priority: "中",
                tags: ["直播技术", "产品招聘", "火山引擎"]
            },
            {
                company: "AWS中国",
                title: "AWS中国与高校合作,启动AI人才培养计划",
                summary: "AWS中国与多所高校合作,启动AI人才培养计划,提供实习和就业机会。",
                link: "https://amazon.jobs/zh-cn/locations/china",
                timestamp: "2026-03-17 15:30",
                priority: "中",
                tags: ["AI人才培养", "校企合作", "AWS中国"]
            }
        ];

        function renderNews() {
            const newsList = document.getElementById('newsList');
            newsList.innerHTML = newsData.map(news => `
                <div class="news-item">
                    <div class="news-header">
                        <span class="company-badge">${news.company}</span>
                        <h3 class="news-title">${news.title}</h3>
                        <span class="priority-badge priority-${news.priority.toLowerCase()}">${news.priority}</span>
                    </div>
                    <p class="news-summary">${news.summary}</p>
                    <div class="news-footer">
                        <div class="tags">
                            ${news.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div>
                            <a href="${news.link}" target="_blank" class="news-link">查看详情 →</a>
                            <span class="timestamp">${news.timestamp}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderNews);
    </script>
</body>
</html>
